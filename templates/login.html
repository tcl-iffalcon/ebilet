<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Bilet Takip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  :root {
    --accent: #2563EB;
    --accent-dark: #1D4ED8;
    --accent-light: #EFF6FF;
    --bg: #F8F9FB;
    --surface: #FFFFFF;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --text: #111827;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --red: #DC2626;
    --red-light: #FEF2F2;
    --red-border: #FECACA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Geist', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }

  .logo-text {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Geist Mono', monospace;
    margin-top: 1px;
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 16px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-secondary);
  }

  input[type="password"] {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: 'Geist Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }

  input[type="password"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }

  input[type="password"]::placeholder {
    letter-spacing: 0;
    font-family: 'Geist', sans-serif;
    color: var(--text-muted);
    font-size: 13px;
  }

  .btn-login {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 3px rgba(37,99,235,0.3);
    margin-top: 4px;
  }

  .btn-login:hover {
    background: var(--accent-dark);
    box-shadow: 0 2px 8px rgba(37,99,235,0.4);
  }

  .error-box {
    background: var(--red-light);
    border: 1px solid var(--red-border);
    color: var(--red);
    padding: 10px 13px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-6px); }
    75%       { transform: translateX(6px); }
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0 16px;
  }

  .hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
  }

  .hint code {
    font-family: 'Geist Mono', monospace;
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🚄</div>
    <div>
      <div class="logo-text">Bilet Takip</div>
      <div class="logo-sub">otomatik müsaitlik izleme</div>
    </div>
  </div>

  <h1>Giriş Yap</h1>
  <p class="subtitle">Devam etmek için şifrenizi girin.</p>

  {% if error %}
  <div class="error-box">🔒 {{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="form-group">
      <label>Şifre</label>
      <input type="password" name="password" placeholder="Şifrenizi girin" autofocus required>
    </div>
    <button type="submit" class="btn-login">Giriş Yap →</button>
  </form>

  <div class="divider"></div>
  <p class="hint">
    Şifre, Render'daki <code>ADMIN_PASSWORD</code> environment variable'ından gelir.
  </p>
</div>

</body>
</html>
